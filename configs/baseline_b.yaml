# ============================================================
# Baseline B: Vanilla RLHF (RM only)
# PPO fine-tuning with a preference reward model, no safety encoder.
# ============================================================

# --- Models ---
policy_model: "meta-llama/Llama-3.2-1B-Instruct"   # SFT starting point for PPO
rm_base_model: "meta-llama/Llama-3.2-1B"            # base model for RM head

# --- Dataset ---
dataset_name: "PKU-Alignment/PKU-SafeRLHF"
rm_train_subset: null        # null = full dataset; set an int (e.g. 20000) for quick runs
rm_eval_subset: 1000
ppo_train_subset: null       # null = full; set e.g. 10000 for quick dev runs

# --- Sequence lengths ---
max_length: 512              # max tokens for RM (prompt + response)
max_prompt_length: 256       # max prompt tokens fed into PPO

# --- LoRA (shared across RM and PPO policy) ---
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# --- Reward Model Training ---
rm_output_dir: "outputs/rm"
rm_num_epochs: 1
rm_batch_size: 8             # per-device
rm_grad_accumulation: 4      # effective batch = 32
rm_lr: 1.0e-5
rm_warmup_ratio: 0.05
rm_save_steps: 500
rm_eval_steps: 500
rm_logging_steps: 50

# --- PPO Training (TRL 0.12+ / 0.24 API) ---
ppo_output_dir: "outputs/ppo_baseline_b"
ppo_lr: 1.0e-5
ppo_per_device_batch_size: 64       # rollout batch size per device
ppo_num_mini_batches: 8             # gradient-update mini-batches per rollout batch
ppo_local_rollout_forward_batch_size: 32   # smaller forward-pass batch to avoid OOM
ppo_gradient_accumulation_steps: 1
ppo_epochs: 4                       # PPO inner epochs per rollout batch
ppo_total_episodes: 320000          # total (prompt,response) pairs ≈ 5000 update steps
ppo_kl_coeff: 0.1
ppo_cliprange: 0.2
ppo_cliprange_value: 0.2
ppo_vf_coef: 0.1
ppo_max_grad_norm: 1.0
ppo_warmup_ratio: 0.05
ppo_save_steps: 500
ppo_logging_steps: 10

# --- Generation (during PPO rollouts) ---
max_new_tokens: 256
temperature: 1.0
top_k: 0
top_p: 1.0

# --- Evaluation ---
eval_output_dir: "outputs/eval_baseline_b"
eval_batch_size: 16
eval_max_new_tokens: 256
eval_subset: 500             # number of test prompts to evaluate
# Optional: path to a trained Safety Encoder for harm classification.
# Leave null to fall back to RM-score proxy (negative RM score = harmful).
harm_classifier_path: null

# --- Logging ---
use_wandb: false
wandb_project: "nlp-rlhf"
run_name: "baseline_b"
